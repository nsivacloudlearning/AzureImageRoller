trigger:
  branches:
    include:
      - master   # or main, depending on your repo

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: BuildJob
    displayName: Build
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.0.x'   # adjust to your .NET version

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration Release'

    - task: DotNetCoreCLI@2
      displayName: Publish
      inputs:
        command: 'publish'
        projects: '**/*.csproj'
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'

    - task: ArchiveFiles@2
      displayName: Archive published files
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/drop.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  jobs:
  - job: DeployJob
    displayName: Deploy
    pool:
      vmImage: 'windows-latest'
    steps:
    - script: dir '$(Pipeline.Workspace)\drop'
      displayName: 'List artifact contents'
    - task: AzureWebApp@1
      displayName: Deploy to Azure WebApp
      inputs:
        azureSubscription: 'AzureRM-ImgRoller'   # your service connection name
        appName: 'ImgRoller'                     # your App Service name
        appType: 'webAppLinux'                        # or webAppLinux if Linux
        package: '$(Pipeline.Workspace)/drop/drop.zip'
